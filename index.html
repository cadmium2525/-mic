<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Craft & Jump - World1</title>
<link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div id="app">
    <!-- ゲーム描画用キャンバス -->
    <canvas id="game-canvas"></canvas>

    <!-- 上部HUD（コイン・素材・ライフ） -->
    <div id="hud">
      <div id="hud-life"></div>
      <div id="hud-coin">💰 <span id="coin-count">0</span></div>
    </div>

    <!-- 右上：クラフト／インベントリ切替ボタン -->
    <div id="menu-buttons">
      <button id="btn-inventory" class="ui-btn small">🎒</button>
      <button id="btn-craft" class="ui-btn small">🛠️</button>
    </div>

    <!-- 左下：移動パッド -->
    <div id="dpad">
      <button id="btn-left" class="ui-btn dpad-btn">◀</button>
      <button id="btn-right" class="ui-btn dpad-btn">▶</button>
    </div>

    <!-- 右下：ジャンプ／アクション（状況で見た目が変わる） -->
    <div id="action-pad">
      <button id="btn-action" class="ui-btn action-btn">採掘</button>
      <button id="btn-jump" class="ui-btn action-btn primary">ジャンプ</button>
    </div>

    <!-- クラフトパネル -->
    <div id="panel-craft" class="panel hidden">
      <div class="panel-header">クラフト <button class="panel-close" data-close="panel-craft">✕</button></div>
      <div id="craft-list" class="panel-body"></div>
    </div>

    <!-- インベントリパネル -->
    <div id="panel-inventory" class="panel hidden">
      <div class="panel-header">インベントリ <button class="panel-close" data-close="panel-inventory">✕</button></div>
      <div id="inventory-list" class="panel-body"></div>
    </div>

    <!-- 商人パネル -->
    <div id="panel-merchant" class="panel hidden">
      <div class="panel-header">商人 <button class="panel-close" data-close="panel-merchant">✕</button></div>
      <div id="merchant-list" class="panel-body"></div>
    </div>

    <!-- 会話ボックス -->
    <div id="dialogue-box" class="hidden">
      <div id="dialogue-name"></div>
      <div id="dialogue-text"></div>
      <button id="dialogue-next" class="ui-btn small">▶</button>
    </div>

    <!-- タイトル／ステージクリア／ゲームオーバー画面 -->
    <div id="overlay-screen" class="hidden">
      <div id="overlay-title"></div>
      <div id="overlay-sub"></div>
      <button id="overlay-btn" class="ui-btn">スタート</button>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
